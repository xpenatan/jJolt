name: Build and Upload

on:
  workflow_call:
    inputs:
      isRelease:
        required: true
        type: boolean
      shouldUpload:
        required: true
        type: boolean

env:
  CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
  CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
  SIGNING_KEY: ${{ secrets.PGP_SECRET }}
  SIGNING_PASSWORD: ${{ secrets.PGP_PASSPHRASE }}

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: x64

      - name: Append the directory of 'vcvarsall.bat' to PATH environment variable
        uses: myci-actions/export-env-var-powershell@1
        with:
          name: PATH
          value: $env:PATH;C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build

      - name: Download sources
        run: ./gradlew :jolt:download:jolt_download_source

      - name: Build JNI project
        run: ./gradlew :jolt:builder:jParser_build_windows64_jni

      - name: Build FFM project
        run: ./gradlew :jolt:builder:jParser_build_windows64_ffm

      - name: Build TeaVM C project
        run: ./gradlew :jolt:builder:jParser_build_windows64_teavm_c

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: windows-natives
          path: ./jolt/builder/build/c++/libs/
          if-no-files-found: error

  build_linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew :jolt:download:jolt_download_source

      - name: Build JNI project
        run: ./gradlew :jolt:builder:jParser_build_linux64_jni

      - name: Build FFM project
        run: ./gradlew :jolt:builder:jParser_build_linux64_ffm

      - name: Build TeaVM C project
        run: ./gradlew :jolt:builder:jParser_build_linux64_teavm_c

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: linux-natives
          path: ./jolt/builder/build/c++/libs/
          if-no-files-found: error

  build_mac:
    name: Build Mac
    runs-on: macos-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew :jolt:download:jolt_download_source

      - name: Build JNI project
        run: ./gradlew :jolt:builder:jParser_build_mac64_jni :jolt:builder:jParser_build_macArm_jni

      - name: Build FFM project
        run: ./gradlew :jolt:builder:jParser_build_mac64_ffm :jolt:builder:jParser_build_macArm_ffm

      - name: Build TeaVM C project
        run: ./gradlew :jolt:builder:jParser_build_mac64_teavm_c :jolt:builder:jParser_build_macArm_teavm_c

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: mac-natives
          path: ./jolt/builder/build/c++/libs/
          if-no-files-found: error

  build_teavm:
    name: Build TeaVM
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 25

      - name: Install emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 6.0.3

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew :jolt:download:jolt_download_source

      - name: Build Web project
        run: ./gradlew :jolt:builder:jParser_build_web_wasm

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: teavm-natives
          path: ./jolt/builder/build/c++/libs/
          if-no-files-found: error

  build_android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Install NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: false
          link-to-sdk: true

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew :jolt:download:jolt_download_source

      - name: Build JNI project
        run: ./gradlew :jolt:builder:jParser_build_android_jni
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: android-natives
          path: ./jolt/builder/build/c++/libs/
          if-no-files-found: error

  commit_generated_code:
    name: Commit Generated code
    if: ${{ inputs.shouldUpload }}
    needs: [build_windows, build_linux, build_mac, build_android, build_teavm]
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Delete generated Classes
        run: ./gradlew clean

      - name: Download sources
        run: ./gradlew :jolt:download:jolt_download_source

      - name: Generate Jolt classes
        run: ./gradlew :jolt:builder:jParser_generate

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"

      - name: Commit generated code
        run: |
          git add .
          git commit -m "Commit generated code from :jolt:builder:jParser_generate" || echo "No changes to commit"
          git push origin HEAD

  upload_natives:
    name: Upload Natives
    needs: [commit_generated_code]
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout repository with latest changes
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git pull origin ${{ github.ref_name }}  # Pulls the latest from the branch

      - name: Get version
        uses: madhead/read-java-properties@latest
        id: version
        with:
          file: "./gradle.properties"
          property: version
          default: 0.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download windows natives
        uses: actions/download-artifact@v8
        with:
          name: windows-natives
          path: ./jolt/builder/build/c++/libs/

      - name: Download linux natives
        uses: actions/download-artifact@v8
        with:
          name: linux-natives
          path: ./jolt/builder/build/c++/libs/

      - name: Download mac natives
        uses: actions/download-artifact@v8
        with:
          name: mac-natives
          path: ./jolt/builder/build/c++/libs/

      - name: Download android natives
        uses: actions/download-artifact@v8
        with:
          name: android-natives
          path: ./jolt/builder/build/c++/libs/

      - name: Download teavm natives
        uses: actions/download-artifact@v8
        with:
          name: teavm-natives
          path: ./jolt/builder/build/c++/libs/

      - name: Download sources
        run: ./gradlew :jolt:download:jolt_download_source

      - name: Build project
        run: ./gradlew :jolt:builder:jParser_generate

      - name: Upload Release to repository
        uses: nick-fields/retry@v3
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_on: error
          command: ./gradlew publishRelease

      - name: Upload Snapshot to repository
        uses: nick-fields/retry@v3
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_on: error
          command: ./gradlew publishSnapshot

      - name: Create Git tag
        uses: actions/github-script@v7
        if: ${{ inputs.isRelease }}
        with:
          script: |
            const versionOutputs = ${{ toJSON(steps.version.outputs) }};

            var version = versionOutputs.value;

            console.log("Version: " + version);

            var ref = "refs/tags/" + version
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              sha: context.sha
            });
